<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<!--
  AFROTOK QUIZ LIVE  —  teiki5320.github.io/quizz/

  Flow 100 % auto : roue casino → catégorie → question (votes live) → décompte → réponse → loop.
  Pour éditer les questions, modifie questions.js
  Format intrinsèque : 1080 × 1920 (TikTok vertical live). Fond noir pour les tests.

  VOTES TIKTOK LIVE :
    - Lance le bridge Node.js :   node tiktok-bridge.js <pseudo>
    - La page se connecte à     ws://127.0.0.1:8080
    - Les viewers tapent A, B, C, D (ou 1, 2, 3, 4) dans le chat
    - 1 vote par viewer par question (dédoublonnage automatique)
    - Si le bridge n'est pas lancé, la page fonctionne quand même
      (barres à 0, tentative de reconnexion toutes les 3 s)
-->
<title>Afrotok Quiz Live</title>
<meta name="viewport" content="width=1080, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:    #0A0A0A;
    --gold:  #F5C842;
    --green: #2ECC71;
    --red:   #E74C3C;
  }

  html {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  body {
    width: 1080px;
    height: 1920px;
    background: var(--bg);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    position: absolute;
    left: 50%;
    top: 50%;
    transform-origin: center center;
    overflow: hidden;
  }

  /* === HEADER === */
  .header {
    position: absolute;
    top: 40px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 3;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 110px;
    line-height: 1;
    color: var(--gold);
    letter-spacing: 10px;
    text-shadow:
      0 0 30px rgba(245, 200, 66, 0.55),
      0 0 80px rgba(245, 200, 66, 0.25);
    animation: logoGlow 2.5s ease-in-out infinite;
  }
  .tagline {
    font-size: 30px;
    color: #888;
    letter-spacing: 12px;
    margin-top: 4px;
    text-transform: uppercase;
  }
  @keyframes logoGlow {
    0%, 100% { text-shadow: 0 0 30px rgba(245,200,66,0.55), 0 0 80px rgba(245,200,66,0.25); }
    50%      { text-shadow: 0 0 50px rgba(245,200,66,0.85), 0 0 120px rgba(245,200,66,0.5); }
  }

  /* === FLASH OVERLAY === */
  .flash-overlay {
    position: absolute;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
  }
  .flash-overlay.flash { animation: flashBang 0.75s ease-out; }
  @keyframes flashBang {
    0%   { opacity: 0; }
    15%  { opacity: 0.9; }
    100% { opacity: 0; }
  }

  /* === STAGES — PAS de display:none, on utilise opacity pour éviter de casser les transitions === */
  .stage {
    position: absolute;
    top: 240px;
    left: 0;
    right: 0;
    bottom: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 50px;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .stage.active {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }

  /* === WHEEL === */
  #stageSpin { justify-content: center; }

  .wheel-container {
    position: relative;
    width: 960px;
    height: 960px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wheel-spinner {
    width: 960px;
    height: 960px;
    transition: transform 5s cubic-bezier(0.17, 0.85, 0.2, 1);
    transform-origin: center center;
    filter: drop-shadow(0 0 60px rgba(245, 200, 66, 0.4));
  }
  .wheel-svg { width: 100%; height: 100%; }
  .wheel-pointer {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 48px solid transparent;
    border-right: 48px solid transparent;
    border-top: 84px solid var(--gold);
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.7));
    z-index: 10;
  }
  .wheel-hub {
    position: absolute;
    width: 190px;
    height: 190px;
    border-radius: 50%;
    background: var(--bg);
    border: 9px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 60px;
    color: var(--gold);
    z-index: 5;
    box-shadow: 0 0 50px rgba(245, 200, 66, 0.7), inset 0 0 20px rgba(245,200,66,0.3);
  }

  .spin-label {
    margin-top: 60px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 78px;
    color: var(--gold);
    letter-spacing: 8px;
    text-align: center;
    text-shadow: 0 0 30px rgba(245, 200, 66, 0.6);
    min-height: 100px;
  }
  .spin-label.spinning { animation: pulse 1.3s ease-in-out infinite; }
  .spin-label.announce { animation: popBig 0.7s cubic-bezier(.2,1.5,.4,1); }
  @keyframes pulse {
    0%, 100% { opacity: 1;   transform: scale(1); }
    50%      { opacity: 0.6; transform: scale(0.96); }
  }
  @keyframes popBig {
    0%   { transform: scale(0.3);  opacity: 0; }
    60%  { transform: scale(1.2); }
    100% { transform: scale(1);    opacity: 1; }
  }

  /* === QUESTION === */
  .category-badge {
    padding: 22px 60px;
    border-radius: 70px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 58px;
    letter-spacing: 5px;
    margin-bottom: 30px;
    color: #0A0A0A;
    box-shadow: 0 8px 0 rgba(0,0,0,0.4), 0 0 50px rgba(255,255,255,0.15);
    animation: popBig 0.6s cubic-bezier(.2,1.6,.4,1);
  }

  .question-text {
    font-family: 'Nunito', sans-serif;
    font-size: 58px;
    font-weight: 900;
    text-align: center;
    line-height: 1.15;
    color: #fff;
    margin-bottom: 36px;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: slideUp 0.55s ease-out;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(60px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 22px;
    width: 100%;
  }
  .option {
    background: #1a1a1a;
    border: 4px solid #333;
    border-radius: 22px;
    padding: 28px 36px;
    display: flex;
    align-items: center;
    gap: 28px;
    font-size: 40px;
    font-weight: 700;
    color: #fff;
    transition: background 0.4s, border-color 0.4s, transform 0.4s, box-shadow 0.4s, opacity 0.4s;
    opacity: 0;
    transform: translateX(-80px);
    animation: slideInLeft 0.5s ease-out forwards;
  }
  .option:nth-child(1) { animation-delay: 0.05s; }
  .option:nth-child(2) { animation-delay: 0.15s; }
  .option:nth-child(3) { animation-delay: 0.25s; }
  .option:nth-child(4) { animation-delay: 0.35s; }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-80px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .option-letter {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 62px;
    line-height: 1;
    color: var(--gold);
    min-width: 68px;
  }
  .option-text { flex: 1; }

  .option.correct {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
    opacity: 1;
    transform: scale(1.05);
    animation: correctGlow 1.4s ease-in-out infinite;
  }
  .option.correct .option-letter { color: #fff; }
  @keyframes correctGlow {
    0%, 100% { box-shadow: 0 0 40px rgba(46, 204, 113, 0.6); }
    50%      { box-shadow: 0 0 100px rgba(46, 204, 113, 1); }
  }

  .option.wrong {
    background: #2a1010;
    border-color: rgba(231, 76, 60, 0.5);
    opacity: 0.4;
  }
  .option.wrong .option-letter { color: var(--red); }

  /* === ZONE BASSE : slot (timer / description) + barres de vote === */
  .bottom-area {
    margin-top: 30px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 36px;
    min-height: 300px;
  }
  .bottom-slot {
    width: 340px;
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .countdown-container {
    position: relative;
    width: 240px;
    height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .countdown-container.hidden { display: none; }
  .countdown-svg {
    width: 240px;
    height: 240px;
    transform: rotate(-90deg);
  }
  .countdown-track {
    fill: none;
    stroke: #1a1a1a;
    stroke-width: 16;
  }
  .countdown-bar {
    fill: none;
    stroke: var(--gold);
    stroke-width: 16;
    stroke-linecap: round;
  }
  .countdown-text {
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 150px;
    line-height: 1;
    color: #fff;
    text-shadow: 0 0 30px rgba(245, 200, 66, 0.7);
  }
  .countdown-text.beat { animation: beat 0.5s ease-out; }
  @keyframes beat {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.35); color: var(--gold); }
    100% { transform: scale(1); }
  }

  /* === DESCRIPTION (remplace le décompte au reveal) === */
  .description {
    display: none;
    width: 320px;
    min-height: 260px;
    background: linear-gradient(135deg, rgba(245,200,66,0.18), rgba(46,204,113,0.08));
    border: 3px solid var(--gold);
    border-radius: 22px;
    padding: 22px 24px;
    box-shadow: 0 0 50px rgba(245,200,66,0.35);
  }
  .description.show {
    display: flex;
    align-items: center;
    justify-content: center;
    animation: popBig 0.55s cubic-bezier(.2,1.4,.4,1);
  }
  .description-text {
    width: 100%;
    font-family: 'Nunito', sans-serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1.3;
    color: #fff;
    text-align: center;
  }

  /* === BARRES DE VOTE === */
  .votes-container {
    width: 600px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .votes-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 3px;
    padding: 0 6px 2px;
  }
  .votes-title {
    font-size: 26px;
    color: #888;
  }
  .votes-total {
    font-size: 28px;
    color: var(--gold);
    text-shadow: 0 0 10px rgba(245,200,66,0.5);
  }
  .vote-bar {
    position: relative;
    height: 54px;
    background: #141414;
    border: 2px solid #333;
    border-radius: 12px;
    overflow: hidden;
    transition: opacity 0.4s, border-color 0.4s;
  }
  .vote-bar-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 0%;
    background: linear-gradient(90deg, #3a3a3a, #5a5a5a);
    transition: width 0.5s cubic-bezier(0.2, 0.9, 0.3, 1),
                background 0.4s, box-shadow 0.4s;
  }
  .vote-bar.leading { border-color: var(--gold); }
  .vote-bar.leading .vote-bar-fill {
    background: linear-gradient(90deg, #F5C842, #FFE680);
    box-shadow: 0 0 28px rgba(245,200,66,0.65) inset,
                0 0 18px rgba(245,200,66,0.5);
  }
  .vote-bar.correct { border-color: var(--green); }
  .vote-bar.correct .vote-bar-fill {
    background: linear-gradient(90deg, #2ECC71, #58E894);
    box-shadow: 0 0 35px rgba(46,204,113,0.9) inset,
                0 0 22px rgba(46,204,113,0.7);
  }
  .vote-bar.wrong { opacity: 0.42; }
  .vote-bar-content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 22px;
    font-family: 'Bebas Neue', sans-serif;
    color: #fff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.85);
  }
  .vote-bar-letter { font-size: 36px; letter-spacing: 3px; }
  .vote-bar-stats  { font-size: 30px; }
  .vote-bar-stats .pct { opacity: 0.75; margin-left: 10px; }

  /* === INDICATEUR DE CONNEXION === */
  .conn-dot {
    position: absolute;
    top: 28px;
    right: 28px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #444;
    z-index: 60;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .conn-dot.online {
    background: #2ECC71;
    box-shadow: 0 0 14px rgba(46,204,113,0.9);
  }
  .conn-dot.offline { background: #E74C3C; }
</style>
</head>
<body>

  <div class="header">
    <div class="logo">AFROTOK QUIZ</div>
    <div class="tagline">• LIVE •</div>
  </div>

  <div class="conn-dot offline" id="connDot" title="Bridge TikTok"></div>

  <div class="flash-overlay" id="flashOverlay"></div>

  <!-- STAGE 1 : SPIN -->
  <div class="stage active" id="stageSpin">
    <div class="wheel-container">
      <div class="wheel-spinner" id="wheelSpinner">
        <svg class="wheel-svg" viewBox="0 0 600 600">
          <g id="wheelSegments"></g>
        </svg>
      </div>
      <div class="wheel-pointer"></div>
      <div class="wheel-hub">GO!</div>
    </div>
    <div class="spin-label spinning" id="spinLabel">LA ROUE TOURNE...</div>
  </div>

  <!-- STAGE 2 : QUESTION / REVEAL -->
  <div class="stage" id="stageQuestion">
    <div class="category-badge" id="categoryBadge">MUSIQUE</div>
    <div class="question-text" id="questionText">—</div>
    <div class="options" id="options"></div>
    <div class="bottom-area">
      <div class="bottom-slot">
        <div class="countdown-container" id="countdownContainer">
          <svg class="countdown-svg" viewBox="0 0 240 240">
            <circle class="countdown-track" cx="120" cy="120" r="105"></circle>
            <circle class="countdown-bar"   id="countdownBar" cx="120" cy="120" r="105"></circle>
          </svg>
          <div class="countdown-text" id="countdownText">5</div>
        </div>
        <div class="description" id="descriptionBox">
          <div class="description-text" id="descriptionText"></div>
        </div>
      </div>
      <div class="votes-container" id="votesContainer">
        <div class="votes-header">
          <span class="votes-title">VOTES LIVE</span>
          <span class="votes-total">👥 <span id="totalVotes">0</span></span>
        </div>
        <div class="vote-bar" data-letter="A">
          <div class="vote-bar-fill"></div>
          <div class="vote-bar-content">
            <span class="vote-bar-letter">A</span>
            <span class="vote-bar-stats"><span class="count">0</span><span class="pct">0%</span></span>
          </div>
        </div>
        <div class="vote-bar" data-letter="B">
          <div class="vote-bar-fill"></div>
          <div class="vote-bar-content">
            <span class="vote-bar-letter">B</span>
            <span class="vote-bar-stats"><span class="count">0</span><span class="pct">0%</span></span>
          </div>
        </div>
        <div class="vote-bar" data-letter="C">
          <div class="vote-bar-fill"></div>
          <div class="vote-bar-content">
            <span class="vote-bar-letter">C</span>
            <span class="vote-bar-stats"><span class="count">0</span><span class="pct">0%</span></span>
          </div>
        </div>
        <div class="vote-bar" data-letter="D">
          <div class="vote-bar-fill"></div>
          <div class="vote-bar-content">
            <span class="vote-bar-letter">D</span>
            <span class="vote-bar-stats"><span class="count">0</span><span class="pct">0%</span></span>
          </div>
        </div>
      </div>
    </div>
  </div>

<script src="questions.js"></script>
<script>
(function () {
  'use strict';

  // ========== CONFIG ==========
  const COUNTDOWN_SECONDS = 5;
  const REVEAL_SECONDS    = 5;
  const SPIN_DURATION_MS  = 5000;

  const CATEGORIES = {
    musique:      { label: 'MUSIQUE',     emoji: '🎵', color: '#F5C842' },
    geographie:   { label: 'GÉO',         emoji: '🌍', color: '#3498DB' },
    culture:      { label: 'CULTURE',     emoji: '🎭', color: '#E67E22' },
    football:     { label: 'FOOT',        emoji: '⚽', color: '#27AE60' },
    gastronomie:  { label: 'GASTRO',      emoji: '🍛', color: '#E74C3C' },
    cinema:       { label: 'CINÉMA',      emoji: '🎬', color: '#8E44AD' },
    histoire:     { label: 'HISTOIRE',    emoji: '👑', color: '#D4AC0D' },
    destinations: { label: 'VOYAGE',      emoji: '🏝️', color: '#16A085' },
    faune:        { label: 'FAUNE',       emoji: '🐘', color: '#935116' },
    telerealite:  { label: 'TÉLÉRÉALITÉ', emoji: '📺', color: '#D81B60' },
    devinettes:   { label: 'DEVINETTE',   emoji: '🧠', color: '#F39C12' }
  };

  const CAT_ORDER = [
    'musique', 'geographie', 'culture', 'football',
    'gastronomie', 'cinema', 'histoire', 'destinations',
    'faune', 'telerealite', 'devinettes'
  ];

  const N_SEGMENTS    = CAT_ORDER.length; // 11
  const ANGLE_PER_SEG = 360 / N_SEGMENTS;

  // ========== STATE ==========
  let wheelRotation   = 0;
  let usedIndices     = new Set();
  let currentQuestion = null;
  let currentCategory = null;
  let currentState    = 'spin';                 // 'spin' | 'question' | 'reveal'
  let votes           = { A: 0, B: 0, C: 0, D: 0 };
  let voters          = new Set();              // dédoublonnage par pseudo
  let ws              = null;

  // ========== AUTO-SCALE (test navigateur) ==========
  function fitViewport() {
    const s = Math.min(window.innerWidth / 1080, window.innerHeight / 1920);
    document.body.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
  }
  window.addEventListener('resize', fitViewport);
  fitViewport();

  // ========== SONS (WebAudio, zéro fichier) ==========
  let ctx = null;
  function sfx() {
    if (!ctx) {
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { ctx = null; }
    }
    if (ctx && ctx.state === 'suspended') { try { ctx.resume(); } catch(e){} }
    return ctx;
  }
  function tone(freq, dur, type, vol, when) {
    const c = sfx(); if (!c) return;
    const t0 = c.currentTime + (when || 0);
    const osc = c.createOscillator();
    const g   = c.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(vol || 0.2, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g).connect(c.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }
  function sWoosh() {
    const c = sfx(); if (!c) return;
    const dur = 4.8;
    const buf = c.createBuffer(1, Math.floor(c.sampleRate * dur), c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    }
    const src = c.createBufferSource();
    src.buffer = buf;
    const filt = c.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.setValueAtTime(2800, c.currentTime);
    filt.frequency.exponentialRampToValueAtTime(180, c.currentTime + dur);
    filt.Q.value = 0.9;
    const g = c.createGain();
    g.gain.setValueAtTime(0.35, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.005, c.currentTime + dur);
    src.connect(filt).connect(g).connect(c.destination);
    src.start();
  }
  function sTick()    { tone(1200, 0.08, 'square', 0.14); }
  function sJackpot() { tone(900, 0.06, 'square', 0.2); setTimeout(()=>tone(1400, 0.15, 'square', 0.22), 60); }
  function sFanfare() {
    const notes = [523, 659, 784, 1047, 1319];
    notes.forEach((f, i) => tone(f, 0.28, 'triangle', 0.2, i * 0.09));
  }
  function sDing() {
    tone(523.25, 0.35, 'triangle', 0.22, 0);
    tone(659.25, 0.45, 'triangle', 0.22, 0.08);
    tone(783.99, 0.6,  'triangle', 0.25, 0.16);
  }
  function unlockAudio() { sfx(); }
  window.addEventListener('click',   unlockAudio, { once: true });
  window.addEventListener('keydown', unlockAudio, { once: true });
  window.addEventListener('touchstart', unlockAudio, { once: true });

  // ========== WHEEL BUILD ==========
  function buildWheel() {
    const group = document.getElementById('wheelSegments');
    group.innerHTML = '';
    const cx = 300, cy = 300, r = 290;

    for (let i = 0; i < N_SEGMENTS; i++) {
      const catId = CAT_ORDER[i];
      const cat   = CATEGORIES[catId];

      const a1 = (-90 + i * ANGLE_PER_SEG) * Math.PI / 180;
      const a2 = (-90 + (i + 1) * ANGLE_PER_SEG) * Math.PI / 180;
      const x1 = cx + r * Math.cos(a1);
      const y1 = cy + r * Math.sin(a1);
      const x2 = cx + r * Math.cos(a2);
      const y2 = cy + r * Math.sin(a2);
      const largeArc = ANGLE_PER_SEG > 180 ? 1 : 0;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d',
        'M ' + cx + ' ' + cy +
        ' L ' + x1 + ' ' + y1 +
        ' A ' + r + ' ' + r + ' 0 ' + largeArc + ' 1 ' + x2 + ' ' + y2 +
        ' Z');
      path.setAttribute('fill', cat.color);
      path.setAttribute('stroke', '#0A0A0A');
      path.setAttribute('stroke-width', '3');
      group.appendChild(path);

      // Emoji au milieu du segment
      const bisAngle = (-90 + i * ANGLE_PER_SEG + ANGLE_PER_SEG / 2) * Math.PI / 180;
      const tr = r * 0.72;
      const tx = cx + tr * Math.cos(bisAngle);
      const ty = cy + tr * Math.sin(bisAngle);

      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', tx);
      text.setAttribute('y', ty);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'central');
      text.setAttribute('font-size', '56');
      text.textContent = cat.emoji;
      group.appendChild(text);
    }
  }

  // ========== STAGES ==========
  function showStage(id) {
    document.querySelectorAll('.stage').forEach(function (s) { s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
  }

  function flashScreen() {
    const f = document.getElementById('flashOverlay');
    f.classList.remove('flash');
    void f.offsetWidth;
    f.classList.add('flash');
  }

  // ========== SPIN ==========
  function spinWheel() {
    currentState = 'spin';
    showStage('stageSpin');
    const label = document.getElementById('spinLabel');
    label.classList.remove('announce');
    label.classList.add('spinning');
    label.textContent = 'LA ROUE TOURNE...';

    // Choisir un segment cible
    const targetIndex = Math.floor(Math.random() * N_SEGMENTS);
    currentCategory   = CAT_ORDER[targetIndex];

    // Centre du segment i (CW depuis l'est) = -90 + i*ANGLE + ANGLE/2
    // On veut l'amener à -90 (pointe du haut)
    const centerAngle = -90 + targetIndex * ANGLE_PER_SEG + ANGLE_PER_SEG / 2;
    const desiredMod  = ((-90 - centerAngle) % 360 + 360) % 360;
    const currentMod  = ((wheelRotation % 360) + 360) % 360;
    let delta = desiredMod - currentMod;
    if (delta < 0) delta += 360;
    delta += 360 * 6; // 6 tours complets de drama

    wheelRotation += delta;
    const spinner = document.getElementById('wheelSpinner');
    // Force un reflow pour être sûr que la transition redémarre proprement
    void spinner.offsetWidth;
    spinner.style.transform = 'rotate(' + wheelRotation + 'deg)';

    sWoosh();

    setTimeout(function () {
      const cat = CATEGORIES[currentCategory];
      label.classList.remove('spinning');
      label.classList.remove('announce');
      void label.offsetWidth;
      label.classList.add('announce');
      label.textContent = cat.emoji + '  ' + cat.label + '  ' + cat.emoji;
      sJackpot();
      setTimeout(showQuestion, 950);
    }, SPIN_DURATION_MS + 100);
  }

  // ========== QUESTION PICK ==========
  function pickQuestion(category) {
    const candidates = [];
    for (let i = 0; i < QUESTIONS.length; i++) {
      if (QUESTIONS[i].category === category && !usedIndices.has(i)) candidates.push(i);
    }
    if (candidates.length === 0) {
      for (let i = 0; i < QUESTIONS.length; i++) {
        if (QUESTIONS[i].category === category) {
          usedIndices.delete(i);
          candidates.push(i);
        }
      }
    }
    if (candidates.length === 0) return null;
    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    usedIndices.add(pick);
    return QUESTIONS[pick];
  }

  // ========== SHOW QUESTION ==========
  function showQuestion() {
    const q = pickQuestion(currentCategory);
    if (!q) {
      currentQuestion = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
      currentCategory = currentQuestion.category;
    } else {
      currentQuestion = q;
    }

    const cat = CATEGORIES[currentCategory];
    const badge = document.getElementById('categoryBadge');
    badge.textContent = cat.emoji + '  ' + cat.label;
    badge.style.background = cat.color;
    // Re-trigger pop animation
    badge.style.animation = 'none';
    void badge.offsetWidth;
    badge.style.animation = '';

    const qText = document.getElementById('questionText');
    qText.textContent = currentQuestion.question;
    qText.style.animation = 'none';
    void qText.offsetWidth;
    qText.style.animation = '';

    const optionsEl = document.getElementById('options');
    optionsEl.innerHTML = '';
    const letters = ['A', 'B', 'C', 'D'];
    currentQuestion.options.forEach(function (opt, i) {
      const div = document.createElement('div');
      div.className = 'option';
      div.innerHTML =
        '<div class="option-letter">' + letters[i] + '</div>' +
        '<div class="option-text">' + opt + '</div>';
      optionsEl.appendChild(div);
    });

    // Reset countdown + description + votes
    document.getElementById('countdownContainer').classList.remove('hidden');
    const descBox = document.getElementById('descriptionBox');
    descBox.classList.remove('show');
    document.getElementById('descriptionText').textContent = '';
    resetVotes();
    currentState = 'question';

    const bar = document.getElementById('countdownBar');
    const circumference = 2 * Math.PI * 105;
    bar.setAttribute('stroke-dasharray', circumference);
    bar.style.transition = 'none';
    bar.setAttribute('stroke-dashoffset', 0);
    bar.style.stroke = 'var(--gold)';

    const textEl = document.getElementById('countdownText');
    textEl.textContent = COUNTDOWN_SECONDS;

    showStage('stageQuestion');

    // Lance l'animation du stroke après reflow
    void bar.getBoundingClientRect();
    bar.style.transition = 'stroke-dashoffset ' + COUNTDOWN_SECONDS + 's linear, stroke 0.3s';
    bar.setAttribute('stroke-dashoffset', circumference);

    // Fanfare d'entrée de question
    sFanfare();

    // Beat initial
    textEl.classList.remove('beat');
    void textEl.offsetWidth;
    textEl.classList.add('beat');

    // Tick par seconde
    let remaining = COUNTDOWN_SECONDS;
    const tick = function () {
      remaining--;
      if (remaining <= 0) {
        textEl.textContent = '0';
        revealAnswer();
        return;
      }
      textEl.textContent = remaining;
      textEl.classList.remove('beat');
      void textEl.offsetWidth;
      textEl.classList.add('beat');
      sTick();
      if (remaining <= 2) bar.style.stroke = 'var(--red)';
      setTimeout(tick, 1000);
    };
    setTimeout(tick, 1000);
  }

  // ========== REVEAL ==========
  function revealAnswer() {
    currentState = 'reveal';

    const opts = document.querySelectorAll('#options .option');
    opts.forEach(function (opt, i) {
      if (i === currentQuestion.correct) opt.classList.add('correct');
      else opt.classList.add('wrong');
    });

    // Highlight de la bonne barre de vote + remplace timer par description
    document.getElementById('countdownContainer').classList.add('hidden');
    const descBox = document.getElementById('descriptionBox');
    document.getElementById('descriptionText').textContent = currentQuestion.description || '';
    descBox.classList.add('show');

    const correctLetter = ['A', 'B', 'C', 'D'][currentQuestion.correct];
    document.querySelectorAll('.vote-bar').forEach(function (bar) {
      bar.classList.remove('leading');
      if (bar.dataset.letter === correctLetter) bar.classList.add('correct');
      else bar.classList.add('wrong');
    });

    flashScreen();
    sDing();

    setTimeout(spinWheel, REVEAL_SECONDS * 1000);
  }

  // ========== VOTES ==========
  function resetVotes() {
    votes  = { A: 0, B: 0, C: 0, D: 0 };
    voters = new Set();
    document.getElementById('totalVotes').textContent = '0';
    document.querySelectorAll('.vote-bar').forEach(function (bar) {
      bar.classList.remove('leading', 'correct', 'wrong');
      bar.querySelector('.vote-bar-fill').style.width = '0%';
      bar.querySelector('.count').textContent = '0';
      bar.querySelector('.pct').textContent   = '0%';
    });
  }

  function updateVoteBars() {
    const total = votes.A + votes.B + votes.C + votes.D;
    document.getElementById('totalVotes').textContent = total;
    let maxVal = 0;
    ['A', 'B', 'C', 'D'].forEach(function (l) {
      if (votes[l] > maxVal) maxVal = votes[l];
    });
    ['A', 'B', 'C', 'D'].forEach(function (l) {
      const bar = document.querySelector('.vote-bar[data-letter="' + l + '"]');
      if (!bar) return;
      const pct = total > 0 ? Math.round((votes[l] / total) * 100) : 0;
      bar.querySelector('.vote-bar-fill').style.width = pct + '%';
      bar.querySelector('.count').textContent = votes[l];
      bar.querySelector('.pct').textContent   = pct + '%';
      if (currentState === 'question') {
        bar.classList.remove('leading');
        if (maxVal > 0 && votes[l] === maxVal) bar.classList.add('leading');
      }
    });
  }

  function addVote(user, letter) {
    if (currentState !== 'question') return;
    if (!votes.hasOwnProperty(letter)) return;
    if (voters.has(user)) return;
    voters.add(user);
    votes[letter]++;
    updateVoteBars();
  }

  // ========== WEBSOCKET BRIDGE ==========
  const DIGIT_MAP = { '1': 'A', '2': 'B', '3': 'C', '4': 'D' };

  function extractVote(data) {
    if (!data) return null;
    let user = null, msg = null;

    // Format natif du bridge : { user, message }
    if (typeof data.user === 'string' && typeof data.message === 'string') {
      user = data.user; msg = data.message;
    }
    // Formats compatibles StreamerBot
    else if (data.userName && data.message) { user = data.userName; msg = data.message; }
    else if (data.data && data.data.message) {
      const m = data.data.message;
      if (typeof m === 'object') {
        user = (m.user && m.user.name) || m.userName || m.displayName || m.nickname;
        msg  = m.message || m.text;
      } else if (typeof m === 'string') {
        user = (data.data.user && data.data.user.name) || data.data.userName || data.data.displayName;
        msg  = m;
      }
    }

    if (!user || !msg) return null;
    let letter = String(msg).trim().toUpperCase().charAt(0);
    if (DIGIT_MAP[letter]) letter = DIGIT_MAP[letter];
    if (['A', 'B', 'C', 'D'].indexOf(letter) === -1) return null;
    return { user: user, letter: letter };
  }

  function updateConnStatus(online) {
    const dot = document.getElementById('connDot');
    if (!dot) return;
    dot.className = 'conn-dot ' + (online ? 'online' : 'offline');
  }

  function connectWS() {
    try {
      ws = new WebSocket('ws://127.0.0.1:8080');
      ws.onopen    = function () { updateConnStatus(true); };
      ws.onclose   = function () {
        updateConnStatus(false);
        setTimeout(connectWS, 3000);
      };
      ws.onerror   = function () { try { ws.close(); } catch (e) {} };
      ws.onmessage = function (evt) {
        try {
          const parsed = extractVote(JSON.parse(evt.data));
          if (parsed) addVote(parsed.user, parsed.letter);
        } catch (e) { /* ignore */ }
      };
    } catch (e) {
      updateConnStatus(false);
      setTimeout(connectWS, 3000);
    }
  }

  // ========== INIT ==========
  buildWheel();
  connectWS();
  setTimeout(spinWheel, 1200);

})();
</script>
